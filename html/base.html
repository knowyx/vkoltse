<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>{{ pagename }} | Образование в кольце</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='style/base.css') }}">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
        <script src="https://smartcaptcha.cloud.yandex.ru/captcha.js" defer></script>
    </head>
    <body>
        <header>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand d-inline-block align-text-top" href="/">
                        <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" width="50px" height="40px" class="d-inline-block">
                        Образование в кольце
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="/news">Новости</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/story">Истории</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/story/submit">Подать историю</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/about">О проекте</a>
                             </li>
                        </ul>
                        {{ user | safe}}
                    </div>
              </div>
            </nav>
        </header>
        <div class="container">
            {% block content %}{% endblock %}
            <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
                <div class="col-md-4 d-flex align-items-center">
                    <a class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" href="/">
                        <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" width="50px" height="40px" class="bi">
                    </a>
                    <span class="mb-3 mb-md-0 text-body-secondary">© 2026. Конжин Н.А., Нефедов А.С.</span>
                </div>

                <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://t.me/" aria-label="Telegram"><img src="{{ url_for('static', filename='img/telegram.svg') }}" alt="telegram link" width="24px" height="24px" class="bi"></a>
                </li>
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://max.ru/" aria-label="Max"><img src="{{ url_for('static', filename='img/max.svg') }}" alt="max link" width="24px" height="24px" class="bi"></a>
                </li>
                </ul>
            </footer>
        </div>
    </body>   
</html>
